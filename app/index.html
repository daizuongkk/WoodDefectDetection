<!DOCTYPE html>
<html lang="vi">

<head>
	<meta charset="UTF-8" />
	<title>Wood Defect Detection</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background: #f4f6f8;
			padding: 40px;
		}

		.container {
			max-width: 900px;
			margin: auto;
			background: white;
			padding: 24px;
			border-radius: 12px;
			box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
		}

		h1 {
			margin-bottom: 8px;
		}

		.preview-wrap {
			position: relative;
			display: inline-block;
			margin-top: 20px;
			max-width: 100%;
		}

		#preview {
			max-width: 800px;
			width: 100%;
			border-radius: 8px;
		}

		#canvas {
			position: absolute;
			left: 0;
			top: 0;
		}

		button {
			padding: 10px 18px;
			border: none;
			border-radius: 8px;
			background: #2563eb;
			color: white;
			cursor: pointer;
			margin-left: 8px;
		}

		input {
			padding: 8px;
		}

		table {
			width: 100%;
			margin-top: 24px;
			border-collapse: collapse;
		}

		th,
		td {
			padding: 10px;
			border-bottom: 1px solid #ddd;
			text-align: left;
		}

		.status {
			margin-top: 16px;
			font-size: 18px;
			font-weight: bold;
		}

		.pass {
			color: green;
		}

		.ng {
			color: red;
		}
	</style>
</head>

<body>
	<div class="container">
		<h1>Nhận diện lỗi bề mặt sản phẩm gỗ phủ sơn</h1>
		<p>Phát hiện lỗi: xước, trầy, nứt, dập/phồng, vết lõm/lỗ.</p>

		<input type="file" id="imageInput" accept="image/*" />
		<button onclick="predict()">Nhận diện</button>

		<div class="status" id="status"></div>

		<div class="preview-wrap">
			<img id="preview" />
			<canvas id="canvas"></canvas>
		</div>

		<table>
			<thead>
				<tr>
					<th>STT</th>
					<th>Loại lỗi</th>
					<th>Độ tin cậy</th>
					<th>Bounding Box</th>
				</tr>
			</thead>
			<tbody id="resultBody"></tbody>
		</table>
	</div>

	<script>
		const input = document.getElementById("imageInput");
		const preview = document.getElementById("preview");
		const canvas = document.getElementById("canvas");
		const ctx = canvas.getContext("2d");
		const resultBody = document.getElementById("resultBody");
		const statusDiv = document.getElementById("status");

		input.addEventListener("change", () => {
			const file = input.files[0];
			if (!file) return;

			preview.src = URL.createObjectURL(file);

			preview.onload = () => {
				canvas.width = preview.clientWidth;
				canvas.height = preview.clientHeight;
				ctx.clearRect(0, 0, canvas.width, canvas.height);
			};
		});

		async function predict() {
			const file = input.files[0];

			if (!file) {
				alert("Vui lòng chọn ảnh!");
				return;
			}

			const formData = new FormData();
			formData.append("file", file);

			statusDiv.innerText = "Đang nhận diện...";
			resultBody.innerHTML = "";

			const response = await fetch("http://127.0.0.1:8000/predict", {
				method: "POST",
				body: formData
			});

			const data = await response.json();

			drawBoxes(data.detections);

			statusDiv.innerText = `Kết quả: ${data.quality_status} - Tổng lỗi: ${data.total_defects}`;
			statusDiv.className = "status " + (data.quality_status === "PASS" ? "pass" : "ng");

			data.detections.forEach((d, index) => {
				const row = document.createElement("tr");

				row.innerHTML = `
          <td>${index + 1}</td>
          <td>${d.class_name}</td>
          <td>${(d.confidence * 100).toFixed(2)}%</td>
          <td>
            x1=${d.bbox.x1}, y1=${d.bbox.y1},
            x2=${d.bbox.x2}, y2=${d.bbox.y2}
          </td>
        `;

				resultBody.appendChild(row);
			});
		}

		function drawBoxes(detections) {
			canvas.width = preview.clientWidth;
			canvas.height = preview.clientHeight;

			ctx.clearRect(0, 0, canvas.width, canvas.height);

			const scaleX = preview.clientWidth / preview.naturalWidth;
			const scaleY = preview.clientHeight / preview.naturalHeight;

			detections.forEach(d => {
				const x1 = d.bbox.x1 * scaleX;
				const y1 = d.bbox.y1 * scaleY;
				const x2 = d.bbox.x2 * scaleX;
				const y2 = d.bbox.y2 * scaleY;

				const width = x2 - x1;
				const height = y2 - y1;

				ctx.lineWidth = 3;
				ctx.strokeStyle = "red";
				ctx.strokeRect(x1, y1, width, height);

				ctx.fillStyle = "red";
				ctx.font = "16px Arial";

				const text = `${d.class_name} ${(d.confidence * 100).toFixed(1)}%`;
				ctx.fillText(text, x1, Math.max(y1 - 8, 16));
			});
		}
	</script>
</body>

</html>
